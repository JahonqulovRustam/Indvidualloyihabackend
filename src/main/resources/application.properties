spring.application.name=medicore-hms

# =============================================
# Database Configuration
# BUG FIX: Password source codeda HECH QACHON saqlanmaydi!
# Quyidagi qiymatlarni environment variable orqali bering:
#   export DB_URL=jdbc:postgresql://localhost:5432/Medicore_hms
#   export DB_USERNAME=postgres
#   export DB_PASSWORD=your_password
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/Medicore_hms}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Rustam2005}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
# BUG FIX: Secret key ham environment variable orqali berilishi kerak
# Bu yerda qoldirilgan qiymat faqat local development uchun
application.security.jwt.secret-key=${JWT_SECRET:4d3a8f1b2c9e7d6f0a5b3c2e1d8f7a4b6c9e2d1f0a5b3c4d8f7e6a1b2c3d4e5f}
application.security.jwt.expiration=86400000

# Server
server.port=8080

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,https://medicore-plum.vercel.app}
spring.flyway.validate-on-migrate=false
spring.jpa.open-in-view=false
